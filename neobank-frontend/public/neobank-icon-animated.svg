<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 200 160"
  fill="none"
>
  <defs>
    <linearGradient id="neoGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>

    <style>
      .draw {
        stroke-dasharray: 300;
        stroke-dashoffset: 300;
        animation: drawLine 1.2s ease-out forwards;
      }

      @keyframes drawLine {
        to {
          stroke-dashoffset: 0;
        }
      }
    </style>
  </defs>

  <!-- Animated swoosh -->
  <path
    class="draw"
    d="M30 110c20 30 100 40 140 0"
    stroke="url(#neoGradient)"
    stroke-width="14"
    stroke-linecap="round"
  />

  <!-- Stylized N -->
  <path
    d="M30 120V30l60 70V40"
    stroke="url(#neoGradient)"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Bank roof -->
  <path d="M95 45l40-25 40 25" fill="#0f2942"/>
  <rect x="100" y="45" width="70" height="12" fill="#0f2942"/>

  <!-- Pillars -->
  <rect x="112" y="57" width="10" height="55" rx="2" fill="#0f2942"/>
  <rect x="132" y="57" width="10" height="55" rx="2" fill="#0f2942"/>
  <rect x="152" y="57" width="10" height="55" rx="2" fill="#0f2942"/>

  <!-- Base -->
  <rect x="102" y="112" width="76" height="10" rx="2" fill="#0f2942"/>
</svg>
