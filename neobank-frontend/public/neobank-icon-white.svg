  <!-- Pillars -->
  <rect x="112" y="57" width="10" height="55" rx="2" fill="#ffffff"/>
  <rect x="132" y="57" width="10" height="55" rx="2" fill="#ffffff"/>
  <rect x="152" y="57" width="10" height="55" rx="2" fill="#ffffff"/>

  <!-- Base -->
